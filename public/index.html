<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Live Editor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2ff;
      --panel: #ffffff;
      --panel-2: #111827;
      --border: #d1d5db;
      --muted: #6b7280;
      --primary: #4f46e5;
      --primary-2: #4338ca;
      --success-bg: #dcfce7;
      --success-text: #166534;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: #111827;
      min-height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      background: #1f2937;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #111827;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .2px;
    }

    .header-sub {
      color: #9ca3af;
      font-size: .9rem;
      text-align: right;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .pane {
      width: 50%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--panel);
    }

    .pane + .pane {
      border-left: 1px solid var(--border);
    }

    .pane-label {
      padding: 10px 12px;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      color: #e5e7eb;
      background: var(--panel-2);
    }

    .editor-textarea {
      flex: 1;
      width: 100%;
      resize: none;
      border: 0;
      outline: none;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.55;
      background: #0f172a;
      color: #f8fafc;
    }

    .preview-head {
      padding: 10px 12px;
      background: var(--success-bg);
      color: var(--success-text);
      border-bottom: 1px solid #bbf7d0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: .9rem;
      font-weight: 600;
    }

    .badge {
      font-size: .67rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: #86efac;
      color: #166534;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-weight: 800;
    }

    /* Toolbar WAJIB tepat di atas area Live Preview */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .02);
    }

    .btn {
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover { background: #f1f5f9; }
    .btn:active { transform: translateY(1px); }

    .toolbar select,
    .toolbar input[type="color"] {
      height: 34px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 0 8px;
      cursor: pointer;
      font-size: .9rem;
    }

    .toolbar .group {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 3px 6px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
    }

    .toolbar .sep {
      width: 1px;
      height: 24px;
      background: #d1d5db;
      margin: 0 2px;
    }

    .preview-frame {
      flex: 1;
      width: 100%;
      border: 0;
      background: #fff;
      min-height: 0;
    }

    @media (max-width: 980px) {
      .main { flex-direction: column; }
      .pane { width: 100%; min-height: 50vh; }
      .pane + .pane { border-left: 0; border-top: 1px solid var(--border); }
      .header { flex-direction: column; align-items: flex-start; }
      .header-sub { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-title">&lt;/&gt; HTML Live Editor</div>
      <div class="header-sub">Pilih teks di Preview, klik toolbar, HTML kiri otomatis ikut berubah.</div>
    </header>

    <main class="main">
      <section class="pane">
        <div class="pane-label">index.html (Source)</div>
        <textarea id="html-editor" class="editor-textarea" spellcheck="false"></textarea>
      </section>

      <section class="pane">
        <div class="preview-head">
          <span>Live Preview (Editable)</span>
          <span class="badge">Two-way Sync</span>
        </div>

        <div class="toolbar" id="toolbar">
          <button type="button" class="btn" data-cmd="bold" title="Bold"><b>B</b></button>
          <button type="button" class="btn" data-cmd="italic" title="Italic"><i>I</i></button>
          <button type="button" class="btn" data-cmd="underline" title="Underline"><u>U</u></button>
          <button type="button" class="btn" data-cmd="strikeThrough" title="Strike"><s>S</s></button>
          <div class="sep"></div>

          <select id="font-name" title="Jenis Font">
            <option value="">Font...</option>
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier</option>
            <option value="Times New Roman">Times</option>
          </select>

          <select id="font-size" title="Ukuran Font">
            <option value="">Ukuran...</option>
            <option value="1">Sangat kecil</option>
            <option value="2">Kecil</option>
            <option value="3">Normal</option>
            <option value="4">Sedang</option>
            <option value="5">Besar</option>
            <option value="6">Sangat besar</option>
            <option value="7">Raksasa</option>
          </select>

          <div class="sep"></div>

          <span class="group">
            <label for="text-color">Teks</label>
            <input id="text-color" type="color" value="#000000" title="Warna Teks" />
          </span>

          <span class="group">
            <label for="bg-color">Latar</label>
            <input id="bg-color" type="color" value="#ffff00" title="Warna Latar" />
          </span>

          <div class="sep"></div>

          <button type="button" class="btn" data-cmd="justifyLeft" title="Rata Kiri">↤</button>
          <button type="button" class="btn" data-cmd="justifyCenter" title="Rata Tengah">↔</button>
          <button type="button" class="btn" data-cmd="justifyRight" title="Rata Kanan">↦</button>
        </div>

        <iframe id="preview-frame" title="Live Preview" class="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const defaultCode = `<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 {
      color: #4f46e5;
      margin-bottom: 0.5rem;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
    }
    button {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
      transition: background-color 0.3s;
    }
    button:hover { background-color: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Halo, Dunia! 👋</h1>
    <p>Blok teks ini di preview, lalu klik toolbar Bold/Warna/Ukuran.</p>
    <button onclick="alert('Tombol diklik!')">Coba Klik Saya</button>
  </div>
</body>
</html>`;

      const editor = document.getElementById('html-editor');
      const frame = document.getElementById('preview-frame');
      const toolbar = document.getElementById('toolbar');
      const fontName = document.getElementById('font-name');
      const fontSize = document.getElementById('font-size');
      const textColor = document.getElementById('text-color');
      const bgColor = document.getElementById('bg-color');

      let htmlCode = defaultCode;
      let iframeCode = defaultCode;

      function buildInjectedHtml(code) {
        const styleToInject = `
<style data-live-editor="true">
  *, a, button {
    -webkit-user-select: text !important;
    user-select: text !important;
  }
</style>`;

        const scriptToInject = `
<script data-live-editor="true">
(function(){
  window.alert = function(){ console.log('Alert diblok saat mode edit'); };
  window.confirm = function(){ return false; };
  window.prompt = function(){ return null; };

  var savedRange = null;

  function captureSelection() {
    var sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
      savedRange = sel.getRangeAt(0).cloneRange();
    }
  }

  function sanitizeAndEmit() {
    var clone = document.documentElement.cloneNode(true);
    var body = clone.querySelector('body');
    if (body) {
      body.removeAttribute('contenteditable');
      body.style.outline = '';
      if (!body.getAttribute('style')) body.removeAttribute('style');
    }
    var injected = clone.querySelectorAll('[data-live-editor="true"]');
    injected.forEach(function (node) { node.remove(); });
    var result = '<!DOCTYPE html>\\n' + clone.outerHTML;
    window.parent.postMessage({ type: 'UPDATE_FROM_PREVIEW', code: result }, '*');
  }

  function restoreSelection() {
    var sel = window.getSelection();
    if (savedRange && sel) {
      sel.removeAllRanges();
      sel.addRange(savedRange);
    }
  }

  if (document.body) {
    document.body.contentEditable = 'true';
    document.body.style.outline = 'none';
    try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
  }

  document.addEventListener('click', function (e) {
    if (e.target && e.target.closest('a,button')) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  document.addEventListener('selectionchange', captureSelection);
  document.addEventListener('mouseup', captureSelection);
  document.addEventListener('keyup', captureSelection);

  var debounceTimer = null;
  var observer = new MutationObserver(function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(sanitizeAndEmit, 220);
  });

  if (document.body) {
    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true,
      attributes: true
    });
  }

  window.addEventListener('message', function (event) {
    if (!event.data || event.data.type !== 'FORMAT') return;
    window.focus();
    restoreSelection();
    try {
      document.execCommand(event.data.command, false, event.data.value || null);
    } catch (err) {}
    captureSelection();
    sanitizeAndEmit();
  });
})();
<\/script>`;

        if (code.includes('</body>')) {
          return code.replace('</body>', styleToInject + scriptToInject + '\n</body>');
        }
        return code + styleToInject + scriptToInject;
      }

      function renderEditor() {
        editor.value = htmlCode;
      }

      function renderPreview(code) {
        frame.srcdoc = buildInjectedHtml(code);
      }

      function applyFormat(command, value) {
        if (!frame.contentWindow) return;
        frame.contentWindow.postMessage({ type: 'FORMAT', command: command, value: value || null }, '*');
      }

      editor.addEventListener('input', function (e) {
        htmlCode = e.target.value;
        iframeCode = e.target.value;
        renderPreview(iframeCode);
      });

      window.addEventListener('message', function (event) {
        if (!event.data || event.data.type !== 'UPDATE_FROM_PREVIEW') return;
        if (typeof event.data.code !== 'string') return;
        htmlCode = event.data.code;
        renderEditor();
      });

      toolbar.querySelectorAll('[data-cmd]').forEach(function (btn) {
        btn.addEventListener('mousedown', function (e) {
          e.preventDefault();
          applyFormat(btn.getAttribute('data-cmd'));
        });
      });

      fontName.addEventListener('change', function () {
        if (!fontName.value) return;
        applyFormat('fontName', fontName.value);
      });

      fontSize.addEventListener('change', function () {
        if (!fontSize.value) return;
        applyFormat('fontSize', fontSize.value);
      });

      textColor.addEventListener('input', function () {
        applyFormat('foreColor', textColor.value);
      });

      bgColor.addEventListener('input', function () {
        applyFormat('hiliteColor', bgColor.value);
      });

      htmlCode = defaultCode;
      iframeCode = defaultCode;
      renderEditor();
      renderPreview(iframeCode);
    })();
  </script>
</body>
</html>
