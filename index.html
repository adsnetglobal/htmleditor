<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HTML Live Editor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2ff;
      --panel: #ffffff;
      --panel-2: #111827;
      --border: #d1d5db;
      --muted: #6b7280;
      --primary: #4f46e5;
      --primary-2: #4338ca;
      --success-bg: #dcfce7;
      --success-text: #166534;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: #111827;
      min-height: 100vh;
    }

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .header {
      background: #1f2937;
      color: #fff;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #111827;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .2px;
    }

    .header-sub {
      color: #9ca3af;
      font-size: .9rem;
      text-align: right;
    }

    .main {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    .pane {
      width: 50%;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--panel);
    }

    .pane + .pane {
      border-left: 1px solid var(--border);
    }

    .pane-label {
      padding: 10px 12px;
      font-size: .82rem;
      font-weight: 700;
      letter-spacing: .4px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      color: #e5e7eb;
      background: var(--panel-2);
    }

    .editor-textarea {
      flex: 1;
      width: 100%;
      resize: none;
      border: 0;
      outline: none;
      padding: 14px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
      line-height: 1.55;
      background: #0f172a;
      color: #f8fafc;
    }

    .preview-head {
      padding: 10px 12px;
      background: var(--success-bg);
      color: var(--success-text);
      border-bottom: 1px solid #bbf7d0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-size: .9rem;
      font-weight: 600;
    }

    .badge {
      font-size: .67rem;
      padding: 3px 8px;
      border-radius: 999px;
      background: #86efac;
      color: #166534;
      text-transform: uppercase;
      letter-spacing: .6px;
      font-weight: 800;
    }

    /* Toolbar WAJIB tepat di atas area Live Preview */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, .02);
    }

    .btn {
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      color: #1f2937;
      cursor: pointer;
      font-weight: 700;
    }

    .btn:hover { background: #f1f5f9; }
    .btn:active { transform: translateY(1px); }

    .toolbar select,
    .toolbar input[type="color"],
    .toolbar input[type="text"] {
      height: 34px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #fff;
      padding: 0 8px;
      cursor: pointer;
      font-size: .9rem;
    }

    .toolbar .group {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      padding: 3px 6px;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #fff;
    }

    .toolbar .group .tool-label {
      font-size: .78rem;
      color: #334155;
      font-weight: 700;
      white-space: nowrap;
    }

    .toolbar .tool-url {
      width: 190px;
      min-width: 130px;
      font-size: .82rem;
    }

    .toolbar .tool-alt {
      width: 120px;
      min-width: 100px;
      font-size: .82rem;
    }

    .toolbar .tool-block {
      width: 180px;
      min-width: 140px;
      font-size: .82rem;
    }

    .toolbar .sep {
      width: 1px;
      height: 24px;
      background: #d1d5db;
      margin: 0 2px;
    }

    .preview-frame {
      flex: 1;
      width: 100%;
      border: 0;
      background: #fff;
      min-height: 0;
    }

    @media (max-width: 980px) {
      .main { flex-direction: column; }
      .pane { width: 100%; min-height: 50vh; }
      .pane + .pane { border-left: 0; border-top: 1px solid var(--border); }
      .header { flex-direction: column; align-items: flex-start; }
      .header-sub { text-align: left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-title">&lt;/&gt; HTML Live Editor</div>
      <div class="header-sub">Pilih teks di Preview, klik toolbar, HTML kiri otomatis ikut berubah.</div>
    </header>

    <main class="main">
      <section class="pane">
        <div class="pane-label">index.html (Source)</div>
        <textarea id="html-editor" class="editor-textarea" spellcheck="false"></textarea>
      </section>

      <section class="pane">
        <div class="preview-head">
          <span>Live Preview (Editable)</span>
          <span class="badge">Two-way Sync</span>
        </div>

        <div class="toolbar" id="toolbar">
          <button type="button" class="btn" data-cmd="bold" title="Bold"><b>B</b></button>
          <button type="button" class="btn" data-cmd="italic" title="Italic"><i>I</i></button>
          <button type="button" class="btn" data-cmd="underline" title="Underline"><u>U</u></button>
          <button type="button" class="btn" data-cmd="strikeThrough" title="Strike"><s>S</s></button>
          <div class="sep"></div>

          <select id="font-name" title="Jenis Font">
            <option value="">Font...</option>
            <option value="Arial">Arial</option>
            <option value="Verdana">Verdana</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier</option>
            <option value="Times New Roman">Times</option>
          </select>

          <select id="font-size" title="Ukuran Font">
            <option value="">Ukuran...</option>
            <option value="1">Sangat kecil</option>
            <option value="2">Kecil</option>
            <option value="3">Normal</option>
            <option value="4">Sedang</option>
            <option value="5">Besar</option>
            <option value="6">Sangat besar</option>
            <option value="7">Raksasa</option>
          </select>

          <div class="sep"></div>

          <span class="group">
            <label for="text-color">Teks</label>
            <input id="text-color" type="color" value="#000000" title="Warna Teks" />
          </span>

          <span class="group">
            <label for="bg-color">Latar</label>
            <input id="bg-color" type="color" value="#ffff00" title="Warna Latar" />
          </span>

          <div class="sep"></div>

          <button type="button" class="btn" data-cmd="justifyLeft" title="Rata Kiri">↤</button>
          <button type="button" class="btn" data-cmd="justifyCenter" title="Rata Tengah">↔</button>
          <button type="button" class="btn" data-cmd="justifyRight" title="Rata Kanan">↦</button>

          <div class="sep"></div>

          <span class="group">
            <span class="tool-label">Image Link</span>
            <input id="image-url" class="tool-url" type="text" placeholder="https://..." title="URL Gambar" />
            <input id="image-alt" class="tool-alt" type="text" placeholder="Alt text" title="Alt Text" />
            <button type="button" class="btn" id="insert-image" title="Sisipkan Gambar">Img+</button>
          </span>

          <span class="group">
            <span class="tool-label">Section Block</span>
            <select id="block-template" class="tool-block" title="Pilih Block Interaktif">
              <option value="">Pilih block...</option>
              <option value="hero-cta">Hero CTA</option>
              <option value="feature-cards">Feature Cards</option>
              <option value="faq-accordion">FAQ Accordion</option>
              <option value="testi-highlight">Testimoni Highlight</option>
            </select>
            <button type="button" class="btn" id="insert-block" title="Sisipkan Block">Block+</button>
          </span>
        </div>

        <iframe id="preview-frame" title="Live Preview" class="preview-frame" sandbox="allow-scripts allow-modals"></iframe>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const defaultCode = `<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 1rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    h1 {
      color: #4f46e5;
      margin-bottom: 0.5rem;
    }
    p {
      color: #4b5563;
      line-height: 1.5;
    }
    button {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
      transition: background-color 0.3s;
    }
    button:hover { background-color: #4338ca; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Halo, Dunia! 👋</h1>
    <p>Blok teks ini di preview, lalu klik toolbar Bold/Warna/Ukuran.</p>
    <button onclick="alert('Tombol diklik!')">Coba Klik Saya</button>
  </div>
</body>
</html>`;

      const editor = document.getElementById('html-editor');
      const frame = document.getElementById('preview-frame');
      const toolbar = document.getElementById('toolbar');
      const fontName = document.getElementById('font-name');
      const fontSize = document.getElementById('font-size');
      const textColor = document.getElementById('text-color');
      const bgColor = document.getElementById('bg-color');
      const imageUrlInput = document.getElementById('image-url');
      const imageAltInput = document.getElementById('image-alt');
      const insertImageBtn = document.getElementById('insert-image');
      const blockTemplate = document.getElementById('block-template');
      const insertBlockBtn = document.getElementById('insert-block');

      let htmlCode = defaultCode;
      let iframeCode = defaultCode;

      function disableUserScriptsForPreview(code) {
        return String(code || '').replace(/<script\b([^>]*)>([\s\S]*?)<\/script>/gi, function (_full, attrs, body) {
          const cleanedAttrs = String(attrs || '').replace(/\sdata-user-script\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, '').replace(/\stype\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi, '');
          return '<script' + cleanedAttrs + ' type="application/x-live-preview-disabled" data-user-script="1">' + body + '<\\/script>';
        });
      }

      function buildInjectedHtml(code) {
        const styleToInject = `
<style data-live-editor="true">
  *, a, button {
    -webkit-user-select: text !important;
    user-select: text !important;
  }
</style>`;

        const scriptToInject = `
<script data-live-editor="true">
(function(){
  window.alert = function(){ console.log('Alert diblok saat mode edit'); };
  window.confirm = function(){ return false; };
  window.prompt = function(){ return null; };

  var savedRange = null;
  var lastEmittedCode = '';

  function captureSelection() {
    var sel = window.getSelection();
    if (sel && sel.rangeCount > 0) {
      savedRange = sel.getRangeAt(0).cloneRange();
    }
  }

  function sanitizeAndEmit() {
    var clone = document.documentElement.cloneNode(true);
    var body = clone.querySelector('body');
    if (body) {
      body.removeAttribute('contenteditable');
      body.style.outline = '';
      if (!body.getAttribute('style')) body.removeAttribute('style');
    }
    var injected = clone.querySelectorAll('[data-live-editor="true"]');
    injected.forEach(function (node) { node.remove(); });

    var disabledScripts = clone.querySelectorAll('script[data-user-script="1"]');
    disabledScripts.forEach(function (node) {
      if (node.getAttribute('type') === 'application/x-live-preview-disabled') {
        node.removeAttribute('type');
      }
      node.removeAttribute('data-user-script');
    });

    var result = '<!DOCTYPE html>\\n' + clone.outerHTML;

    if (result === lastEmittedCode) return;
    lastEmittedCode = result;

    window.parent.postMessage({ type: 'UPDATE_FROM_PREVIEW', code: result }, '*');
  }

  function moveCaretToEditableEnd() {
    if (!document.body) return;
    var sel = window.getSelection();
    if (!sel) return;

    var range = document.createRange();
    range.selectNodeContents(document.body);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
    savedRange = range.cloneRange();
  }

  function restoreSelection() {
    var sel = window.getSelection();
    if (!sel) return;

    if (!savedRange || !savedRange.startContainer || !savedRange.startContainer.isConnected) {
      moveCaretToEditableEnd();
      return;
    }

    try {
      sel.removeAllRanges();
      sel.addRange(savedRange);
    } catch (e) {
      moveCaretToEditableEnd();
    }
  }

  function reselectNodeContents(node) {
    if (!node) return;
    var sel = window.getSelection();
    if (!sel) return;
    var range = document.createRange();
    range.selectNodeContents(node);
    sel.removeAllRanges();
    sel.addRange(range);
    savedRange = range.cloneRange();
  }

  function applyColorWithImportant(propertyName, colorValue) {
    var sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return;

    var range = sel.getRangeAt(0);
    if (range.collapsed) return;

    var wrapper = document.createElement('span');
    wrapper.setAttribute('data-live-editor-color', '1');
    wrapper.style.setProperty(propertyName, colorValue, 'important');

    try {
      range.surroundContents(wrapper);
    } catch (e) {
      var frag = range.extractContents();
      wrapper.appendChild(frag);
      range.insertNode(wrapper);
    }

    reselectNodeContents(wrapper);
  }

  function sanitizeImageUrl(url) {
    var raw = String(url || '').trim();
    if (!raw) return '';
    if (/^https?:\/\//i.test(raw)) return raw;
    if (/^\//.test(raw)) return raw;
    return '';
  }

  function insertHtmlAtSelection(html) {
    var sel = window.getSelection();
    if (!sel) return;

    if (sel.rangeCount === 0) {
      if (document.body) {
        document.body.insertAdjacentHTML('beforeend', html);
      }
      return;
    }

    var range = sel.getRangeAt(0);
    range.deleteContents();

    var container = document.createElement('div');
    container.innerHTML = html;
    var frag = document.createDocumentFragment();
    var lastNode = null;
    while (container.firstChild) {
      lastNode = frag.appendChild(container.firstChild);
    }

    range.insertNode(frag);

    if (lastNode) {
      var after = document.createRange();
      after.setStartAfter(lastNode);
      after.collapse(true);
      sel.removeAllRanges();
      sel.addRange(after);
      savedRange = after.cloneRange();
    }
  }

  function buildInteractiveBlock(templateKey) {
    var stamp = Date.now();

    if (templateKey === 'hero-cta') {
      return '<section data-live-block="hero-cta" style="padding:28px;margin:14px 0;border-radius:16px;border:1px solid #c7d2fe;background:linear-gradient(135deg,#eef2ff,#ffffff);">'
        + '<h2 style="margin:0 0 8px;color:#312e81;">Judul Hero yang Menarik</h2>'
        + '<p style="margin:0 0 14px;color:#4338ca;">Tambahkan value proposition singkat agar user langsung paham manfaat utama.</p>'
        + '<a href="#" style="display:inline-block;background:#4f46e5;color:#fff;padding:10px 16px;border-radius:10px;text-decoration:none;font-weight:700;">Klik CTA</a>'
        + '</section>';
    }

    if (templateKey === 'feature-cards') {
      return '<section data-live-block="feature-cards" style="margin:16px 0;">'
        + '<h3 style="margin:0 0 12px;color:#0f172a;">Fitur Unggulan</h3>'
        + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">'
        + '<article style="padding:14px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.06);"><strong style="color:#1d4ed8;">Cepat</strong><p style="margin:8px 0 0;color:#475569;">Setup ringkas dan mudah dipahami.</p></article>'
        + '<article style="padding:14px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.06);"><strong style="color:#1d4ed8;">Interaktif</strong><p style="margin:8px 0 0;color:#475569;">Elemen mudah diedit langsung di preview.</p></article>'
        + '<article style="padding:14px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;box-shadow:0 2px 8px rgba(15,23,42,.06);"><strong style="color:#1d4ed8;">Sinkron</strong><p style="margin:8px 0 0;color:#475569;">HTML source otomatis ikut berubah.</p></article>'
        + '</div>'
        + '</section>';
    }

    if (templateKey === 'faq-accordion') {
      return '<section data-live-block="faq-accordion" style="margin:16px 0;padding:14px;border:1px solid #dbeafe;border-radius:14px;background:#eff6ff;">'
        + '<h3 style="margin:0 0 10px;color:#1e3a8a;">FAQ Interaktif</h3>'
        + '<details style="margin-bottom:8px;background:#fff;border:1px solid #bfdbfe;border-radius:10px;padding:8px 10px;"><summary style="cursor:pointer;font-weight:700;color:#1d4ed8;">Pertanyaan 1</summary><p style="margin:8px 0 0;color:#334155;">Jawaban singkat untuk pertanyaan pertama.</p></details>'
        + '<details style="background:#fff;border:1px solid #bfdbfe;border-radius:10px;padding:8px 10px;"><summary style="cursor:pointer;font-weight:700;color:#1d4ed8;">Pertanyaan 2</summary><p style="margin:8px 0 0;color:#334155;">Jawaban singkat untuk pertanyaan kedua.</p></details>'
        + '</section>';
    }

    if (templateKey === 'testi-highlight') {
      return '<section data-live-block="testi-highlight" style="margin:16px 0;padding:18px;border-left:5px solid #22c55e;border-radius:12px;background:#f0fdf4;">'
        + '<h3 style="margin:0 0 8px;color:#166534;">Testimoni Pengguna</h3>'
        + '<blockquote style="margin:0;color:#14532d;font-style:italic;">"Produk ini bikin workflow saya jauh lebih cepat dan rapi."</blockquote>'
        + '<p style="margin:10px 0 0;color:#15803d;font-weight:700;">— Nama Pengguna #' + stamp + '</p>'
        + '</section>';
    }

    return '';
  }

  function insertImageByLink(payload) {
    var rawUrl = payload && payload.url;
    var safeUrl = sanitizeImageUrl(rawUrl);
    if (!safeUrl) return;

    var alt = String((payload && payload.alt) || 'Gambar').replace(/"/g, '&quot;');
    var html = '<img src="' + safeUrl + '" alt="' + alt + '" style="max-width:100%;height:auto;border-radius:10px;display:block;margin:12px 0;" />';
    insertHtmlAtSelection(html);
  }

  if (document.body) {
    document.body.contentEditable = 'true';
    document.body.style.outline = 'none';
    try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
  }

  document.addEventListener('click', function (e) {
    if (e.target && e.target.closest('a,button')) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  document.addEventListener('selectionchange', captureSelection);
  document.addEventListener('mouseup', captureSelection);
  document.addEventListener('keyup', captureSelection);

  var debounceTimer = null;
  var observer = new MutationObserver(function () {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(sanitizeAndEmit, 220);
  });

  if (document.body) {
    observer.observe(document.body, {
      childList: true,
      subtree: true,
      characterData: true,
      attributes: true
    });
  }

  window.addEventListener('message', function (event) {
    if (!event.data || event.data.type !== 'FORMAT') return;
    window.focus();
    restoreSelection();

    var cmd = event.data.command;
    var val = event.data.value || null;

    try {
      if (cmd === 'foreColor' && val) {
        applyColorWithImportant('color', val);
      } else if (cmd === 'hiliteColor' && val) {
        applyColorWithImportant('background-color', val);
      } else if (cmd === 'insertImageByUrl') {
        insertImageByLink(val || {});
      } else if (cmd === 'insertBlockTemplate') {
        var blockHtml = buildInteractiveBlock(String(val || ''));
        if (blockHtml) insertHtmlAtSelection(blockHtml);
      } else {
        document.execCommand(cmd, false, val);
      }
    } catch (err) {}

    captureSelection();
    sanitizeAndEmit();
  });
})();
<\/script>`;

        const safeCode = disableUserScriptsForPreview(code);

        if (safeCode.includes('</body>')) {
          return safeCode.replace('</body>', styleToInject + scriptToInject + '\n</body>');
        }
        return safeCode + styleToInject + scriptToInject;
      }

      function renderEditor() {
        editor.value = htmlCode;
      }

      function renderPreview(code) {
        frame.srcdoc = buildInjectedHtml(code);
      }

      function applyFormat(command, value) {
        if (!frame.contentWindow) return;
        frame.contentWindow.postMessage({ type: 'FORMAT', command: command, value: value || null }, '*');
        setTimeout(function () {
          try {
            frame.contentWindow.focus();
          } catch (e) {}
        }, 0);
      }

      editor.addEventListener('input', function (e) {
        htmlCode = e.target.value;
        iframeCode = e.target.value;
        renderPreview(iframeCode);
      });

      window.addEventListener('message', function (event) {
        if (!event.data || event.data.type !== 'UPDATE_FROM_PREVIEW') return;
        if (typeof event.data.code !== 'string') return;
        if (event.data.code === htmlCode) return;
        if (editor.value === event.data.code) return;
        if (document.activeElement === editor) return;
        htmlCode = event.data.code;
        renderEditor();
      });

      toolbar.querySelectorAll('[data-cmd]').forEach(function (btn) {
        btn.addEventListener('click', function () {
          applyFormat(btn.getAttribute('data-cmd'));
        });
      });

      fontName.addEventListener('change', function () {
        if (!fontName.value) return;
        applyFormat('fontName', fontName.value);
      });

      fontSize.addEventListener('change', function () {
        if (!fontSize.value) return;
        applyFormat('fontSize', fontSize.value);
      });

      function applyTextColor() {
        applyFormat('foreColor', textColor.value);
      }

      function applyBgColor() {
        applyFormat('hiliteColor', bgColor.value);
      }

      function insertImageFromToolbar() {
        var url = imageUrlInput.value.trim();
        if (!url) return;
        applyFormat('insertImageByUrl', { url: url, alt: imageAltInput.value.trim() });
        imageUrlInput.focus();
      }

      function insertInteractiveBlock() {
        if (!blockTemplate.value) return;
        applyFormat('insertBlockTemplate', blockTemplate.value);
      }

      textColor.addEventListener('input', applyTextColor);
      textColor.addEventListener('change', applyTextColor);

      bgColor.addEventListener('input', applyBgColor);
      bgColor.addEventListener('change', applyBgColor);

      insertImageBtn.addEventListener('click', function () {
        insertImageFromToolbar();
      });

      imageUrlInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          insertImageFromToolbar();
        }
      });

      insertBlockBtn.addEventListener('click', function () {
        insertInteractiveBlock();
      });

      htmlCode = defaultCode;
      iframeCode = defaultCode;
      renderEditor();
      renderPreview(iframeCode);
    })();
  </script>
</body>
</html>
